<!-- Order Form HTML -->
<h2>Order Your Noodles</h2>
<form id="orderForm">
  <label>Name:</label>
  <input type="text" id="name" required />

  <label>Contact Number:</label>
  <input type="text" id="contact" required />

  <label>Order Method:</label>
  <select id="method" onchange="toggleDeliveryDetails()">
    <option value="Pickup">Pickup</option>
    <option value="Delivery">Delivery</option>
  </select>

  <div class="delivery-details" id="deliveryDetails" style="display:none;">
    <label>Postal Code:</label>
    <input type="text" id="postalCode" />

    <label>Address Line:</label>
    <input type="text" id="addressLine" />

    <label>Unit Number:</label>
    <input type="text" id="unitNumber" />
  </div>

  <h3>Items:</h3>
  <div>
    <label>Beef Shoryu ($12):</label>
    <button type="button" onclick="adjustQty('beef', -1)">-</button>
    <span id="qtyBeef">0</span>
    <button type="button" onclick="adjustQty('beef', 1)">+</button>
  </div>
  <div>
    <label>Chicken Paitan ($12):</label>
    <button type="button" onclick="adjustQty('chicken', -1)">-</button>
    <span id="qtyChicken">0</span>
    <button type="button" onclick="adjustQty('chicken', 1)">+</button>
  </div>
  <div>
    <label>Prawn Noodle ($14):</label>
    <button type="button" onclick="adjustQty('prawn', -1)">-</button>
    <span id="qtyPrawn">0</span>
    <button type="button" onclick="adjustQty('prawn', 1)">+</button>
  </div>

  <h3>Total: $<span id="total">0.00</span></h3>

  <button type="button" onclick="submitOrder()">Confirm & Send</button>
</form>

<!-- Styles -->
<style>
  #orderForm {
    max-width: 600px;
    margin: auto;
    padding: 20px;
    font-family: Arial, sans-serif;
  }
  #orderForm input[type=text], #orderForm select {
    width: 100%;
    padding: 8px;
    margin: 8px 0;
  }
  #orderForm button {
    padding: 8px 12px;
    margin: 8px 4px;
  }
  .delivery-details {
    display: none;
  }
</style>

<!-- Scripts -->
<script>
  let qtyBeef = 0;
  let qtyChicken = 0;
  let qtyPrawn = 0;

  function toggleDeliveryDetails() {
    const method = document.getElementById('method').value;
    document.getElementById('deliveryDetails').style.display = (method === 'Delivery') ? 'block' : 'none';
  }

  function adjustQty(item, delta) {
    if (item === 'beef') {
      qtyBeef = Math.max(0, qtyBeef + delta);
      document.getElementById('qtyBeef').innerText = qtyBeef;
    } else if (item === 'chicken') {
      qtyChicken = Math.max(0, qtyChicken + delta);
      document.getElementById('qtyChicken').innerText = qtyChicken;
    } else if (item === 'prawn') {
      qtyPrawn = Math.max(0, qtyPrawn + delta);
      document.getElementById('qtyPrawn').innerText = qtyPrawn;
    }
    calculateTotal();
  }

  function calculateTotal() {
    const total = (qtyBeef * 12) + (qtyChicken * 12) + (qtyPrawn * 14);
    document.getElementById('total').innerText = total.toFixed(2);
    return total;
  }

  function sendOrderToGoogleScript(orderData) {
    const url = 'YOUR_WEB_APP_URL_HERE'; // Replace with your Google Apps Script Web App URL
    return fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    }).then(response => response.json());
  }

  function submitOrder() {
    const total = calculateTotal();
    const name = document.getElementById('name').value.trim();
    const contact = document.getElementById('contact').value.trim();
    const method = document.getElementById('method').value;

    if (!name || !contact || total === 0) {
      alert('Please fill in your name, contact, and select at least one item.');
      return;
    }

    if (method === 'Delivery') {
      const postalCode = document.getElementById('postalCode').value.trim();
      const addressLine = document.getElementById('addressLine').value.trim();
      const unitNumber = document.getElementById('unitNumber').value.trim();

      if (!postalCode || !addressLine || !unitNumber) {
        alert('Please fill in all delivery address details.');
        return;
      }
    }

    const orderData = {
      name: name,
      contact: contact,
      method: method,
      addressLine: document.getElementById('addressLine').value.trim(),
      postalCode: document.getElementById('postalCode').value.trim(),
      unitNumber: document.getElementById('unitNumber').value.trim(),
      qtyBeef: qtyBeef,
      qtyChicken: qtyChicken,
      qtyPrawn: qtyPrawn,
      total: total.toFixed(2)
    };

    sendOrderToGoogleScript(orderData)
      .then(() => {
        alert('Order sent successfully! Please send your payment proof via WhatsApp.');
        const waNumber = '6588100809'; // Your WhatsApp number
        const message = `Customer: ${name}\nContact: ${contact}\nOrder Method: ${method}\nTotal: $${total.toFixed(2)}\nPlease send your payment screenshot via WhatsApp.`;
        window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`, '_blank');
      })
      .catch((error) => {
        alert('Failed to send order. Please try again.');
        console.error(error);
      });
  }
</script>
