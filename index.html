<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>alleysahtoo Order Form</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 500px; margin: auto; background-color: #fdfaf0; color: #1a1a1a; }
        .card { background: #ffffff; padding: 30px; border-radius: 20px; border: 2px solid #000; box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
        h2 { text-align: center; border-bottom: 3px solid #000; padding-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; margin-top: 0; }
        label { font-weight: bold; display: block; margin-top: 15px; }
        input[type="text"], input[type="tel"], select { width: 100%; padding: 12px; margin-top: 5px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        input:focus { border-color: #000; outline: none; }
        .menu-section { margin-top: 20px; background: #f9f9f9; padding: 15px; border-radius: 10px; }
        .item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .qty { width: 70px !important; text-align: center; border: 2px solid #000 !important; font-weight: bold; }
        .total-box { background: #000; color: #fff; padding: 20px; border-radius: 12px; text-align: center; margin-top: 25px; font-size: 24px; font-weight: 800; }
        .qr-section { text-align: center; margin: 30px 0; border: 1px dashed #000; padding: 15px; border-radius: 10px; }
        .qr-img { width: 100%; max-width: 220px; border: 2px solid #000; margin-top: 10px; }
        .btn { background: #25D366; color: white; border: none; padding: 20px; width: 100%; border-radius: 12px; font-weight: 900; font-size: 18px; cursor: pointer; transition: transform 0.2s; margin-top: 10px; }
        .btn:active { transform: scale(0.98); }
        .footer-note { font-size: 12px; color: #666; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <h2>alleysahtoo</h2>
    
    <!-- Email Backup via FormSubmit -->
    <form id="orderForm" action="https://formsubmit.co" method="POST">
        <label>Customer Name</label>
        <input type="text" name="Name" id="name" placeholder="Enter your name" required>
        
        <label>Contact Number (+65)</label>
        <input type="tel" name="Contact" id="phone" placeholder="8-digit SG number" required>

        <div class="menu-section">
            <p style="margin-top:0;"><b>Our Menu ($6.00/ea)</b></p>
            <div class="item"><span>Beef Shoryu</span><input type="number" name="Beef_Shoryu" class="qty" id="qty1" value="0" min="0"></div>
            <div class="item"><span>Chicken Paitan</span><input type="number" name="Chicken_Paitan" class="qty" id="qty2" value="0" min="0"></div>
            <div class="item"><span>Prawn Noodle</span><input type="number" name="Prawn_Noodle" class="qty" id="qty3" value="0" min="0"></div>
        </div>

        <label>Collection Method</label>
        <select name="Method" id="method" onchange="calculate()">
            <option value="Pickup">Self Pick-up (Free)</option>
            <option value="Delivery">Islandwide Delivery (+$10.00)</option>
        </select>

        <div class="total-box">Total Payable: $<span id="totalDisplay">0.00</span></div>
        <input type="hidden" name="Total_Amount" id="hiddenTotal">

        <div class="qr-section">
            <p style="margin:0;"><b>Step 1: Pay via PayNow QR</b></p>
            <>
            <img src="YOUR_IMAGE_URL_HERE" class="qr-img" alt="PayNow QR Code">
            <p style="font-size: 11px; margin-top: 8px;">Screenshot your successful payment.</p>
        </div>

        <p style="text-align:center; font-weight:bold;">Step 2:</p>
        <button type="button" class="btn" onclick="submitToWhatsApp()">Confirm & Send to Mel</button>
        <p class="footer-note">Clicking will open WhatsApp to send your order details.</p>
    </form>
</div>

<script>
    const inputs = document.querySelectorAll('.qty');
    inputs.forEach(input => input.addEventListener('input', calculate));

    function calculate() {
        const q1 = parseInt(document.getElementById('qty1').value) || 0;
        const q2 = parseInt(document.getElementById('qty2').value) || 0;
        const q3 = parseInt(document.getElementById('qty3').value) || 0;
        
        const subtotal = (q1 + q2 + q3) * 6;
        const deliveryFee = (document.getElementById('method').value === 'Delivery' && subtotal > 0) ? 10 : 0;
        const total = subtotal + deliveryFee;

        document.getElementById('totalDisplay').innerText = total.toFixed(2);
        document.getElementById('hiddenTotal').value = total.toFixed(2);
        return {q1, q2, q3, total, method: document.getElementById('method').value};
    }

    function submitToWhatsApp() {
        const data = calculate();
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;

        if (!name || !phone || data.total === 0) {
            alert("Please provide your name, contact, and at least 1 item!");
            return;
        }

        // Build the text message
        let orderList = "";
        if(data.q1 > 0) orderList += `- Beef Shoryu x${data.q1}%0A`;
        if(data.q2 > 0) orderList += `- Chicken Paitan x${data.q2}%0A`;
        if(data.q3 > 0) orderList += `- Prawn Noodle x${data.q3}%0A`;

        const message = `*NEW ORDER - alleysahtoo*%0A%0A` +
                        `*Customer:* ${name}%0A` +
                        `*Phone:* ${phone}%0A%0A` +
                        `*Items:*%0A${orderList}%0A` +
                        `*Method:* ${data.method}%0A` +
                        `*Total Amount: $${data.total.toFixed(2)}*%0A%0A` +
                        `_I've completed the PayNow transfer. Sending screenshot now!_`;

        // Redirect to WhatsApp (Mel: +65 88100809)
        const waUrl = `https://wa.me{message}`;
        
        // Also trigger the email backup
        document.getElementById('orderForm').submit();
        
        window.open(waUrl, '_blank');
    }
</script>

</body>
</html>
